version: "3.8"

services:
  gateone-api:
    build: .
    container_name: gateone-pricing-api
    ports:
      - "8000:8000"
    environment:
      # Liste de clés API séparées par des virgules — à changer en production
      - GATEONE_API_KEYS=demo-key-gateone-2026,prod-key-change-me
    volumes:
      - ./models:/app/models:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
